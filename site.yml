---
  - hosts: all
    become: true
    pre_tasks:
    - name: update the packages on Ubuntu
      tags: always
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_distribution == "Ubuntu"
    - name: update the packages on Centos
      tags: always
      dnf:
        update_only: yes
        update_cache: yes
      when: ansible_distribution == "Amazon"

  - hosts: web
    become: true
    tasks:
    - name: installation of apache2 and php packages on Ubuntu
      tags: apache2,ubuntu,php
      apt:
        name: 
          - apache2
          - libapache2-mod-php
        state: latest
      when: ansible_distribution == "Ubuntu"

    - name: installation of apache and php packages on Centos
      tags: apache2,centos,php
      dnf:
        name: 
          - httpd
          - php
        state: latest
      when: ansible_distribution == "Amazon"
    
    - name: started httpd (Centos)
      tags: apache2,centos,php
      service:
        name: httpd
        state: started
        enabled: true
      when: ansible_distribution == "Amazon"

    - name: Copying of default.html to web server
      tags: html,copy
      copy: 
        src: default-site.html
        dest: /var/www/html/index.html
        owner: root
        group: root
        mode: 0644


    - name: Changing Email in httpd
      tags: apache2,centos,php
      lineinfile:
        path: /etc/httpd/conf/httpd.conf
        regexp: '^ServerAdmin'
        line: ServerAdmin khan@testing.com
      when: ansible_distribution == "Amazon"
      register: httpd

    - name: Restart httpd (Centos)
      tags: apache2,centos,php
      service:
        name: httpd
        state: restarted
      when: httpd.changed
      
  - hosts: databases
    become: true
    tasks: 
      - name: Installation of MariaDB server on Centos server
        tags: mariadb,centos
        dnf: 
          name: mariadb
          state: latest
        when: ansible_distribution == "Amazon"

      - name: Installation of MariaDB server on Ubuntu server
        tags: mariadb,ubuntu
        apt:
          name: mariadb-server
          state: latest
        when: ansible_distribution == "Ubuntu"

  - hosts: file
    become: true
    tasks:
      - name: installation of file server on Ubuntu
        tags: samba
        package:
          name: samba
          state: latest
        

  - hosts: workstation
    become: true
    tasks: 

    - name: install unzip 
      package: 
        name: unzip

    - name: Install Terraform 
      unarchive: 
        src: https://releases.hashicorp.com/terraform/1.5.0/terraform_1.5.0_linux_amd64.zip
        dest: /usr/local/bin
        remote_src: yes
        mode: 0755
        owner: root
        group: root

